<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I-T Converter</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<!-- Hidden File Pickers -->

<input
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
style="display:none;">

<input
type="file"
id="galleryInput"
accept="image/*"
style="display:none;">

<input
type="file"
id="pdfInput"
accept=".pdf,application/pdf"
style="display:none;">

<input
type="file"
id="browseInput"
accept="image/*,.pdf"
style="display:none;">
<!-- ========================= -->
<!-- Splash Screen -->
<!-- ========================= -->

<div id="splashScreen">

    <img src="assets/logo/logo.png" id="logo" alt="Logo">

    <h1>I-T CONVERTER</h1>

    <h3>Offline Image-to-Text Converter</h3>

    <p class="version">Version 1.0.0</p>

    <p class="developer">

        Design & Developed by

    </p>

    <h2 class="company">

        100, 000 000 000

    </h2>

    <div class="loader"></div>

</div>

<!-- ========================= -->
<!-- Home Screen -->
<!-- ========================= -->

<div id="homeScreen">

<header>

<button id="menuBtn">

☰

</button>

<button id="aboutBtn">

ℹ

</button>

</header>

<img src="assets/logo/logo.png"

class="homeLogo"

alt="Logo">

<h1>I-T CONVERTER</h1>

<p>

Offline Image-to-Text Converter

</p>

<button class="mainButton"

id="cameraBtn">

📷 CAMERA

</button>

<button class="mainButton"

id="galleryBtn">

🖼 GALLERY

</button>

<button class="mainButton"

id="pdfBtn">

📄 PDF

</button>

<button class="mainButton"

id="browseBtn">

📁 BROWSE FILES

</button>

<button class="exitButton"

id="exitBtn">

🚪 EXIT

</button>

</div>

<script src="app.js"></script>

</body>

</html>
