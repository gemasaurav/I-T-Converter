<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>I-T Converter</title>

<link rel="stylesheet" href="style.css">

</head>

<body>
<!-- Hidden File Pickers -->

<input
type="file"
id="cameraInput"
accept="image/*"
capture="environment"
style="display:none;">

<input
type="file"
id="galleryInput"
accept="image/*"
style="display:none;">

<input
type="file"
id="pdfInput"
accept=".pdf,application/pdf"
style="display:none;">

<input
type="file"
id="browseInput"
accept="image/*,.pdf"
style="display:none;">
<!-- ========================= -->
<!-- Splash Screen -->
<!-- ========================= -->

<div id="splashScreen">

    <img src="assets/logo/logo.png" id="logo" alt="Logo">

    <h1>I-T CONVERTER</h1>

    <h3>Offline Image-to-Text Converter</h3>

    <p class="version">Version 1.0.0</p>

    <p class="developer">

        Design & Developed by

    </p>

    <h2 class="company">

        100, 000 000 000

    </h2>

    <div class="loader"></div>

</div>

<!-- ========================= -->
<!-- Home Screen -->
<!-- ========================= -->

<div id="homeScreen">

<header>

<button id="menuBtn">

☰

</button>

<button id="aboutBtn">

ℹ

</button>

</header>

<img src="assets/logo/logo.png"

class="homeLogo"

alt="Logo">

<h1>I-T CONVERTER</h1>

<p>

Offline Image-to-Text Converter

</p>

<button class="mainButton"

id="cameraBtn">

📷 CAMERA

</button>

<button class="mainButton"

id="galleryBtn">

🖼 GALLERY

</button>

<button class="mainButton"

id="pdfBtn">

📄 PDF

</button>

<button class="mainButton"

id="browseBtn">

📁 BROWSE FILES

</button>

<button class="exitButton"

id="exitBtn">

🚪 EXIT

</button>
<hr style="margin:30px 0;border:1px solid #444;">

<div id="previewSection" style="display:none;">

<h2 style="color:gold;">

Selected Image

</h2>

<img

id="previewImage"

style="width:90%;

max-width:500px;

border-radius:12px;

margin-top:20px;

border:2px solid gold;">

<br><br>

<button

id="extractBtn"

class="mainButton">

🔍 EXTRACT TEXT

</button>

</div>
<!-- ========================= -->
<!-- OCR Result Section -->
<!-- ========================= -->

<div id="resultSection" style="display:none; margin-top:30px;">

<h2 style="color:gold;">

Extracted Text

</h2>

<textarea

id="ocrResult"

rows="12"

style="width:95%;

margin-top:20px;

padding:15px;

font-size:16px;

border-radius:10px;

border:2px solid gold;

background:#222;

color:white;

resize:vertical;">

</textarea>

<div style="margin-top:20px;">

<p id="charCount">

Characters : 0

</p>

<p id="wordCount">

Words : 0

</p>

<p id="lineCount">

Lines : 0

</p>

</div>

<button

id="copyResultBtn"

class="mainButton">

📋 COPY

</button>

<button

id="saveResultBtn"

class="mainButton">

💾 SAVE

</button>

<button

id="shareResultBtn"

class="mainButton">

📤 SHARE

</button>

<button

id="newImageBtn"

class="mainButton">

🔄 NEW IMAGE

</button>

</div>
</div>
<canvas id="ocrCanvas" style="display:none;"></canvas>
<script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
<script src="app.js"></script>

</body>

</html>
